<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="SIGEIN">
  <defs>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#0d6efd"/>
    </linearGradient>
    <linearGradient id="gDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado (bom contraste em abas claras/escuras) -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#gDark)"/>

  <!-- Cubos empilhados (remete ao ícone do menu: "cubes") -->
  <g transform="translate(0,1)">
    <!-- cubo 1 -->
    <path d="M18 30 L32 22 L46 30 L32 38 Z" fill="url(#gBlue)"/>
    <path d="M18 30 L32 38 L32 52 L18 44 Z" fill="#0b5ed7"/>
    <path d="M46 30 L32 38 L32 52 L46 44 Z" fill="#2563eb"/>

    <!-- cubo 2 (topo) -->
    <path d="M24 20 L32 16 L40 20 L32 24 Z" fill="#93c5fd"/>
    <path d="M24 20 L32 24 L32 32 L24 28 Z" fill="#60a5fa"/>
    <path d="M40 20 L32 24 L32 32 L40 28 Z" fill="#3b82f6"/>

    <!-- detalhe verde (badge "Sistema Oficial") -->
    <circle cx="46.5" cy="18.5" r="5.5" fill="#22c55e" stroke="#dcfce7" stroke-width="2"/>
  </g>
</svg>
