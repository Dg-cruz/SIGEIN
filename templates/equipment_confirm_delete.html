{% extends "base.html" %}

<!DOCTYPE html>
<html>
<head>
    <title>Confirmar Exclusão</title>
    <link rel="icon" href="/favicon.ico" sizes="32x32">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/favicon-128.png">
</head>
<body>
    <h2>Tem certeza que deseja excluir o equipamento:</h2>
    <p><strong>{{ equipment.nome }} ({{ equipment.tipo }})</strong></p>

    <form action="/equipment/delete/{{ equipment.id }}" method="get">
        <button type="submit">Sim, excluir</button>
        <a href="/equipment">Cancelar</a>
    </form>
</body>
</html>
