{% extends "base.html" %}
{% set hide_app_header = True %}

{% block title %}{{ titulo }} — Paiol{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', path='css/module-form.css') }}">

<div class="container">
  <h2>{{ titulo }}</h2>
  <p class="form-hint">{{ descricao }}</p>

  <fieldset>
    <legend>Status</legend>
    <div class="module-form-empty">
      <p>Esta funcionalidade está em construção (fase {{ fase }}).</p>
      <div class="buttons">
        <a href="/paiol/dashboard" class="btn-cancel">Voltar ao dashboard</a>
      </div>
    </div>
  </fieldset>
</div>
{% endblock %}
